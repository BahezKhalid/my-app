<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kabab ChwarMshqi</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#111;
    color:white;
}

header{
    text-align:center;
    padding:20px;
    background:#1e1e1e;
}

header h1{
    color:#ffcc00;
    margin:0;
}

.location{
    color:#aaa;
    font-size:14px;
}

.container{
    display:flex;
    flex-wrap:wrap;
    padding:20px;
    gap:20px;
}

.menu{
    flex:1;
}

.menu-item{
    background:#1e1e1e;
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button{
    background:#ffcc00;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.cart{
    flex:1.2;
    background:#1e1e1e;
    padding:15px;
    border-radius:12px;
}

.cart h2{
    color:#ffcc00;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:10px;
}

.cart-box{
    background:#2a2a2a;
    padding:10px;
    border-radius:10px;
    font-size:13px;
    position:relative;
    min-height:80px;
}

.cart-box .remove{
    position:absolute;
    top:5px;
    right:5px;
    background:red;
    color:white;
    border:none;
    border-radius:50%;
    width:20px;
    height:20px;
    font-size:12px;
    cursor:pointer;
}

.section-title{
    margin-top:15px;
    margin-bottom:8px;
    font-weight:bold;
    color:#00d9ff;
}

.total{
    margin-top:15px;
    font-weight:bold;
    font-size:16px;
}

footer{
    text-align:center;
    padding:15px;
    margin-top:20px;
    background:#1e1e1e;
    color:#aaa;
}
</style>
</head>

<body>

<header>
<h1>Kabab ChwarMshqi - کەباب چوار مشقی</h1>
<div class="location">📍 کەرکوک، فلەی ئیخوان</div>
</header>

<div class="container">

<div class="menu" id="menu"></div>

<div class="cart">
<h2>🛒 Order</h2>

<div class="section-title">🍢 Food</div>
<div class="grid" id="foodCart"></div>

<div class="section-title">🥤 Drinks</div>
<div class="grid" id="drinkCart"></div>

<div class="total">Total: <span id="totalPrice">0</span> IQD</div>

</div>

</div>

<footer>
Developed by @BahezKhalidAudl
</footer>

<script>

const menuData = [
{name:"تکەی مریشک", price:2500, type:"food"},
{name:"تکەی گۆشت", price:2500, type:"food"},
{name:"جگەر", price:2500, type:"food"},
{name:"کەباب", price:2500, type:"food"},
{name:"کەباب مەحشی", price:2500, type:"food"},
{name:"موقەبیلات (Small)", price:2500, type:"food"},
{name:"موقەبیلات (Large)", price:5000, type:"food"},
{name:"برنج و شلە ی سادە", price:3000, type:"food"},
{name:"برنج و شلە بە مریشک", price:4500, type:"food"},
{name:"برنج و شلە بە گۆشت", price:6000, type:"food"},
{name:"پێپسی", price:1000, type:"drink"},
{name:"کۆلا", price:1000, type:"drink"},
{name:"سپرایت", price:1000, type:"drink"},
{name:"دیو", price:1000, type:"drink"},
{name:"ڤانتا", price:1000, type:"drink"},
];

const menuDiv = document.getElementById("menu");
const foodCart = document.getElementById("foodCart");
const drinkCart = document.getElementById("drinkCart");
const totalPriceSpan = document.getElementById("totalPrice");

let cart = {};

menuData.forEach(item=>{
    const div=document.createElement("div");
    div.className="menu-item";
    div.innerHTML=`
        <span>${item.name} - ${item.price.toLocaleString()} IQD</span>
        <button onclick="addToCart('${item.name}', ${item.price}, '${item.type}')">Add</button>
    `;
    menuDiv.appendChild(div);
});

function addToCart(name, price, type){
    if(cart[name]){
        cart[name].quantity++;
    }else{
        cart[name]={price, quantity:1, type};
    }
    updateCart();
}

function removeFromCart(name){
    delete cart[name];
    updateCart();
}

function updateCart(){
    foodCart.innerHTML="";
    drinkCart.innerHTML="";
    let total=0;

    for(let name in cart){
        let item=cart[name];
        total+=item.price*item.quantity;

        const box=document.createElement("div");
        box.className="cart-box";
        box.innerHTML=`
            <button class="remove" onclick="removeFromCart('${name}')">X</button>
            <div>${name}</div>
            <div>Qty: ${item.quantity}</div>
            <div>${(item.price*item.quantity).toLocaleString()} IQD</div>
        `;

        if(item.type==="food"){
            foodCart.appendChild(box);
        }else{
            drinkCart.appendChild(box);
        }
    }

    totalPriceSpan.textContent=total.toLocaleString();
}

</script>

</body>
</html>
