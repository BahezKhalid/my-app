<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kabab ChwarMshqi</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#f2f5f9;
}

/* HEADER */
header{
    text-align:center;
    padding:20px;
}

.location{
    color:#666;
    font-size:14px;
}

/* SECTION TITLE */
.section-title{
    font-weight:bold;
    font-size:20px;
    margin:30px 20px 10px;
}

/* GRID SMALL CARDS */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    padding:0 20px;
}

.card{
    background:white;
    border-radius:18px;
    padding:18px 10px;
    text-align:center;
    box-shadow:0 6px 15px rgba(0,0,0,0.05);
    cursor:pointer;
    transition:0.2s;
    font-size:14px;
}

.card:hover{
    transform:scale(1.03);
}

.price{
    margin-top:10px;
    background:#dbeaf5;
    padding:8px;
    border-radius:12px;
    font-weight:bold;
    color:#1877b2;
    font-size:13px;
}

/* ORDER PANEL */
.order-panel{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:white;
    box-shadow:0 -5px 20px rgba(0,0,0,0.1);
    border-radius:25px 25px 0 0;
    padding:15px;
    max-height:40vh;
    overflow:auto;
}

.order-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:6px;
    font-size:13px;
}

.remove{
    color:red;
    cursor:pointer;
    margin-left:8px;
}

.total{
    margin-top:10px;
    font-weight:bold;
}

/* FOOTER */
footer{
    text-align:center;
    margin-top:150px;
    padding:20px;
    color:#777;
}
</style>
</head>
<body>

<header>
<h2>Kabab ChwarMshqi - کەباب چوار مشقی</h2>
<div class="location">📍 کەرکوک، فلکەی ئیخوان</div>
</header>

<!-- FOOD SECTION -->
<div class="section-title">🍽 برژاو و خواردنەکان</div>
<div class="grid" id="foodMenu"></div>

<!-- DRINK SECTION -->
<div class="section-title">🥤 خواردنەوەکان</div>
<div class="grid" id="drinkMenu"></div>

<!-- APPETIZERS -->
<div class="section-title">🥗 موقەبیلات</div>
<div class="grid" id="appMenu"></div>

<!-- ORDER PANEL -->
<div class="order-panel">
<div id="orderList"></div>
<div class="total">Total: <span id="totalPrice">0</span> IQD</div>
</div>

<footer>
Developed by @BahezKhalidAudl
</footer>

<script>

/* DATA */

const foodItems = [
{name:"تکەی مریشک", price:2500},
{name:"تکەی گۆشت", price:2500},
{name:"جگەر", price:2500},
{name:"کەباب", price:2500},
{name:"کەباب مەحشی", price:2500},
{name:"برنج و شلە ی سادە", price:3000},
{name:"برنج و شلە بە مریشک", price:4500},
{name:"برنج و شلە بە گۆشت", price:6000}
];

const drinks = [
{name:"پێپسی", price:500},
{name:"کۆلا", price:500},
{name:"سپرایت", price:500},
{name:"دیو", price:500},
{name:"ڤانتا", price:500}
];

const appetizers = [
{name:"موقەبیلات (Small)", price:2500},
{name:"موقەبیلات (Large)", price:5000}
];

const foodMenu=document.getElementById("foodMenu");
const drinkMenu=document.getElementById("drinkMenu");
const appMenu=document.getElementById("appMenu");
const orderList=document.getElementById("orderList");
const totalPriceSpan=document.getElementById("totalPrice");

let cart={};

/* CREATE CARDS */
function createMenu(items,container){
    items.forEach(item=>{
        const card=document.createElement("div");
        card.className="card";
        card.innerHTML=`
            <div>${item.name}</div>
            <div class="price">${item.price.toLocaleString()} IQD</div>
        `;
        card.onclick=()=>addToCart(item.name,item.price);
        container.appendChild(card);
    });
}

createMenu(foodItems,foodMenu);
createMenu(drinks,drinkMenu);
createMenu(appetizers,appMenu);

/* CART FUNCTIONS */

function addToCart(name,price){
    if(cart[name]){
        cart[name].quantity++;
    }else{
        cart[name]={price:price,quantity:1};
    }
    updateOrder();
}

function removeItem(name){
    delete cart[name];
    updateOrder();
}

function updateOrder(){
    orderList.innerHTML="";
    let total=0;

    for(let name in cart){
        let item=cart[name];
        total+=item.price*item.quantity;

        const div=document.createElement("div");
        div.className="order-item";
        div.innerHTML=`
            <span>${name} x${item.quantity}</span>
            <span>
                ${(item.price*item.quantity).toLocaleString()} IQD
                <span class="remove" onclick="removeItem('${name}')">X</span>
            </span>
        `;
        orderList.appendChild(div);
    }

    totalPriceSpan.textContent=total.toLocaleString();
}

</script>

</body>
</html>
