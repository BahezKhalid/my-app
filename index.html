<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kabab ChwarMshqi</title>

<style>

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#f2f5f9;
}

/* HEADER */

header{
    text-align:center;
    padding:20px;
}

header h1{
    margin:0;
}

.location{
    color:#666;
    font-size:14px;
}

/* GRID - 3 PER ROW */

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    padding:20px;
}

/* CARD STYLE */

.card{
    background:white;
    border-radius:25px;
    padding:30px 20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.05);
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h2{
    margin:0;
    font-size:20px;
}

.price{
    margin-top:20px;
    background:#dbeaf5;
    padding:15px;
    border-radius:15px;
    font-weight:bold;
    font-size:18px;
    color:#1877b2;
}

/* ORDER PANEL */

.order-panel{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:white;
    box-shadow:0 -5px 20px rgba(0,0,0,0.1);
    border-radius:25px 25px 0 0;
    padding:20px;
    max-height:45vh;
    overflow:auto;
}

.order-title{
    font-weight:bold;
    margin-bottom:10px;
}

.order-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
    font-size:14px;
}

.remove{
    color:red;
    cursor:pointer;
    font-weight:bold;
    margin-left:8px;
}

.total{
    margin-top:10px;
    font-weight:bold;
    font-size:16px;
}

/* FOOTER */

footer{
    text-align:center;
    margin-top:120px;
    padding:20px;
    color:#777;
}

</style>
</head>
<body>

<header>
<h1>Kabab ChwarMshqi - کەباب چوار مشقی</h1>
<div class="location">📍 کەرکوک، فلکەی ئیخوان</div>
</header>

<div class="grid" id="menu"></div>

<div class="order-panel">
<div class="order-title">🛒 Your Order</div>
<div id="orderList"></div>
<div class="total">Total: <span id="totalPrice">0</span> IQD</div>
</div>

<footer>
Developed by @BahezKhalidAudl
</footer>

<script>

/* ===== ALL MENU ITEMS ===== */

const menuData = [
{name:"تکەی مریشک", price:2500},
{name:"تکەی گۆشت", price:2500},
{name:"جگەر", price:2500},
{name:"کەباب", price:2500},
{name:"کەباب مەحشی", price:2500},
{name:"موقەبیلات (Small)", price:2500},
{name:"موقەبیلات (Large)", price:5000},
{name:"پێپسی", price:1000},
{name:"کۆلا", price:1000},
{name:"سپرایت", price:1000},
{name:"دیو", price:1000},
{name:"ڤانتا", price:1000},
{name:"برنج و شلە ی سادە", price:3000},
{name:"برنج و شلە بە مریشک", price:4500},
{name:"برنج و شلە بە گۆشت", price:6000}
];

const menuDiv=document.getElementById("menu");
const orderList=document.getElementById("orderList");
const totalPriceSpan=document.getElementById("totalPrice");

let cart={};

/* CREATE CARDS */

menuData.forEach(item=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
        <h2>${item.name}</h2>
        <div class="price">IQD ${item.price.toLocaleString()}</div>
    `;
    card.onclick=()=>addToCart(item.name,item.price);
    menuDiv.appendChild(card);
});

/* ADD TO CART */

function addToCart(name,price){
    if(cart[name]){
        cart[name].quantity++;
    }else{
        cart[name]={price:price,quantity:1};
    }
    updateOrder();
}

/* REMOVE */

function removeItem(name){
    delete cart[name];
    updateOrder();
}

/* UPDATE ORDER */

function updateOrder(){
    orderList.innerHTML="";
    let total=0;

    for(let name in cart){
        let item=cart[name];
        total+=item.price*item.quantity;

        const div=document.createElement("div");
        div.className="order-item";
        div.innerHTML=`
            <span>${name} x${item.quantity}</span>
            <span>
                ${(item.price*item.quantity).toLocaleString()} IQD
                <span class="remove" onclick="removeItem('${name}')">X</span>
            </span>
        `;
        orderList.appendChild(div);
    }

    totalPriceSpan.textContent=total.toLocaleString();
}

</script>

</body>
</html>
